[lintspec]
paths = []
exclude = []
inheritdoc = false
# inheritdoc: require @inheritdoc on items that implement an interface method.
# Set to true when your contracts implement interfaces — then @inheritdoc is
# preferred over repeating NatSpec verbatim. Leave false for standalone contracts.
inheritdoc_override = false
notice_or_dev = false
parallel = 4

[output]
json = false
compact = false
sort = false
stdout = false
exit_zero = false

