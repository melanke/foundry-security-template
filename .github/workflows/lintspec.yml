name: NatSpec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.sol"

jobs:
  lintspec:
    name: NatSpec Completeness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: beeb/lintspec@v0.12.2
        with:
          fail-on-problem: "true"
          # paths intentionally omitted — configured in .lintspec.toml as ["src"].
          # Passing paths: "src" here injects LS_LINTSPEC_PATHS as a plain string;
          # lintspec >=0.17.0 requires paths to be an array and rejects the string,
          # causing an InvalidType error and cascading jq parse failures.
          # Reads .lintspec.toml from the repo root for per-project configuration.
